user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging with timestamps ─────────────────────────────────────────────
    log_format main '$time_iso8601 $remote_addr "$request" $status '
                    '$body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Basic tuning ────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;  # hide Nginx version

    # ── DDoS / Rate limiting zones ──────────────────────────────────────────
    # Global limiter: 10 req/s per IP
    limit_req_zone  $binary_remote_addr zone=api_limit:10m   rate=10r/s;
    # Stricter for auth endpoints
    limit_req_zone  $binary_remote_addr zone=auth_limit:5m   rate=3r/s;
    # Frontend static
    limit_req_zone  $binary_remote_addr zone=front_limit:10m rate=30r/s;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Bad bot / hacker user-agent blocking ────────────────────────────────
    map $http_user_agent $bad_bot {
        default         0;
        ~*nikto         1;
        ~*sqlmap        1;
        ~*nmap          1;
        ~*masscan       1;
        ~*zgrab         1;
        ~*python-httpx  0;   # allow our own services
        ~*python-requests 0;
        ~*curl          0;
        ~*wget          0;
        ~*(scrapy|dirbuster|gobuster|wfuzz|hydra|metasploit) 1;
    }

    # ── GeoIP / connection limits ────────────────────────────────────────────
    limit_conn conn_limit 50;

    include /etc/nginx/conf.d/*.conf;
}
