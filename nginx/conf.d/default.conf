# ─── Block bad bots globally ────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    if ($bad_bot) { return 444; }   # Drop connection silently

    # Certbot ACME challenge (needed for first-time SSL issue)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS — main site ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stockscreener.ru www.stockscreener.ru;

    # SSL Certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/stockscreener.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stockscreener.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/stockscreener.ru/chain.pem;

    # Best-practice SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Drop bad bots
    if ($bad_bot) { return 444; }

    # Block hacker scanner paths
    location ~* ^/(wp-admin|wp-login|\.env|\.git|\.svn|phpmyadmin|adminer|admin\.php|config\.php|setup\.php|xmlrpc\.php|\.htaccess|\.htpasswd|\.DS_Store|etc/passwd) {
        return 403;
    }
    location ~* \.(sql|bak|old|orig|backup|swp|tmp)$ {
        return 403;
    }

    # ── API proxy ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── WebSocket passthrough ─────────────────────────────────────────────
    location /api/v1/ws/ {
        proxy_pass              http://api:8000;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection "upgrade";
        proxy_set_header        Host       $host;
        proxy_set_header        X-Real-IP  $remote_addr;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    # ── Auth rate limiting ─────────────────────────────────────────────────
    location ~* ^/api/v1/(auth|login|register) {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend (Next.js) ────────────────────────────────────────────────
    location / {
        limit_req zone=front_limit burst=50 nodelay;

        proxy_pass         http://frontend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Cache Next.js static assets
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
    }
}
